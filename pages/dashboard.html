<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NoxMarket - Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-300 flex justify-center items-center min-h-screen">

<!-- PHONE FRAME -->
<div class="w-[375px] min-h-screen relative overflow-hidden">

  <!-- BACKGROUND -->
  <div class="absolute inset-0">
    <img src="../img/background.gif" class="w-full h-full object-cover" alt="background">
  </div>

  <div class="absolute inset-0 bg-black/40"></div>

  <!-- CONTENT -->
  <div class="relative z-10 text-white">

    <!-- HEADER -->
    <header class="fixed top-0 w-[375px] bg-white/30 backdrop-blur-md border-b border-white/20 flex items-center justify-between z-50 px-4 py-2">

      <img src="../img/logo.png" class="h-10" alt="Logo">

    </header>

    <main class="p-4 pt-20 pb-24">

      <!-- SEARCH & SALDO -->
      <div class="bg-gradient-to-r from-purple-600 to-indigo-600 p-4 rounded-2xl mb-4">

        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Cari produk di NoxMarket..."
            class="flex-1 p-3 rounded-xl text-black outline-none">

          <button class="bg-white px-4 rounded-xl">
            🔍
          </button>
        </div>

        <div class="grid grid-cols-3 gap-2 mt-4">

          <div class="bg-white/20 p-3 rounded-xl text-center">
            <p class="text-xs text-white">NoxPay</p>
            <h3 class="font-bold text-white">Rp750K</h3>
          </div>

          <div class="bg-white/20 p-3 rounded-xl text-center">
            <p class="text-xs text-white">NoxPoint</p>
            <h3 class="font-bold text-white">1.850</h3>
          </div>

          <div class="bg-white/20 p-3 rounded-xl text-center">
            <p class="text-xs text-white">Voucher</p>
            <h3 class="font-bold text-white">8</h3>
          </div>

        </div>
      </div>

      <!-- MENU -->
      <div class="bg-black/50 backdrop-blur-md rounded-2xl p-4 mb-4">

        <div class="grid grid-cols-5 gap-4 text-center">

  <!-- Audio -->
  <div>
    <div class="flex justify-center">
      <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 19V6l-2 2m0 0l2-2m-2 2h12a2 2 0 012 2v7a2 2 0 01-2 2H7a2 2 0 01-2-2v-7a2 2 0 012-2z" />
      </svg>
    </div>
    <p class="text-xs mt-1">Audio</p>
  </div>

  <!-- Gaming -->
  <div>
    <div class="flex justify-center">
      <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 3v18m9-9H3" />
      </svg>
    </div>
    <p class="text-xs mt-1">Gaming</p>
  </div>

  <!-- Gadget -->
  <div>
    <div class="flex justify-center">
      <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 18h.01M9 21h6a2 2 0 002-2V5a2 2 0 00-2-2H9a2 2 0 00-2 2v14a2 2 0 002 2z" />
      </svg>
    </div>
    <p class="text-xs mt-1">Gadget</p>
  </div>

  <!-- Promo -->
  <div>
    <div class="flex justify-center">
      <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 8c-1.5-2-4-2-4-2s-2 0-2 2 2 3 2 3 1 1 2 2 2 2 2 2" />
      </svg>
    </div>
    <p class="text-xs mt-1">Promo</p>
  </div>

  <!-- Reward -->
  <div>
    <div class="flex justify-center">
      <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.286 3.97a1 1 0 00.95.69h4.178c.969 0 1.371 1.24.588 1.81l-3.38 2.457a1 1 0 00-.364 1.118l1.287 3.97c.3.921-.755 1.688-1.54 1.118l-3.38-2.457a1 1 0 00-1.175 0l-3.38 2.457c-.784.57-1.838-.197-1.539-1.118l1.286-3.97a1 1 0 00-.364-1.118L2.997 9.397c-.783-.57-.38-1.81.588-1.81h4.178a1 1 0 00.95-.69l1.286-3.97z" />
      </svg>
    </div>
    <p class="text-xs mt-1">Reward</p>
  </div>

</div>

      <!-- BANNER -->
      <div class="rounded-2xl overflow-hidden mb-4">
        <img src="../img/PRODUK.png" class="w-full h-30 object-cover" alt="banner">
      </div>

      <!-- FLASH SALE -->
      <div class="bg-black/50 backdrop-blur-md rounded-2xl p-4 mb-4">

        <div class="flex justify-between mb-3">
          <h3 class="font-bold text-lg">🔥 Flash Sale</h3>
          <span class="text-red-400 font-bold">02:15:45</span>
        </div>

        <div class="grid grid-cols-3 gap-3">
          <img src="../img/PRODUK1.png" class="rounded-xl" alt="produk 1">
          <img src="../img/PRODUK2.png" class="rounded-xl" alt="produk 2">
          <img src="../img/PRODUK3.png" class="rounded-xl" alt="produk 3">
        </div>

      </div>

      <!-- PRODUK POPULER -->
      <div>

        <h3 class="font-bold text-lg mb-3">⭐ Produk Populer</h3>

        <div class="grid grid-cols-2 gap-3">

          <div class="bg-black/50 rounded-xl overflow-hidden">
            <img src="../img/PRODUK1.png" class="w-full h-40 object-cover" alt="produk 1">

            <div class="p-3">
              <h4 class="font-semibold">Nox Headphone X1</h4>
              <p class="text-cyan-400 font-bold">Rp299.000</p>
              <p class="text-xs text-gray-400">⭐ 4.9 • Terjual 1.2K</p>
            </div>
          </div>

          <div class="bg-black/50 rounded-xl overflow-hidden">
            <img src="../img/PRODUK2.png" class="w-full h-40 object-cover" alt="produk 2">

            <div class="p-3">
              <h4 class="font-semibold">Nox Speaker Boom</h4>
              <p class="text-cyan-400 font-bold">Rp459.000</p>
              <p class="text-xs text-gray-400">⭐ 4.8 • Terjual 950</p>
            </div>
          </div>

        </div>

      </div>

    </main>


<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[375px] bg-white border-t py-2 flex justify-around items-center z-50">
  <!-- Home (active) -->
  <a href="dashboard.html" class="flex flex-col items-center text-blue-600 text-[10px]">
    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
      <path d="M12 3l9 8h-3v9h-5v-6h-2v6h-5v-9h-3z"/>
    </svg>
    <span>Home</span>
  </a>

  <!-- Testimoni -->
  <a href="testimoni.html" class="flex flex-col items-center text-gray-400 text-[10px]">
    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
      <path d="M21 6h-18c-1.1 0-2 .9-2 2v12l4-4h16c1.1 0 2-.9 2-2v-6c0-1.1-.9-2-2-2z"/>
    </svg>
    <span>Testimoni</span>
  </a>

  <!-- Produk -->
  <a href="produk.html" class="flex flex-col items-center text-gray-400 text-[10px]">
    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
      <path d="M7 4v2h10v-2h2v2h3v2h-1l-2 12h-14l-2-12h-1v-2h3v-2h2zm0 4l1.5 10h7l1.5-10h-10z"/>
    </svg>
    <span>Produk</span>
  </a>

  <!-- About -->
  <a href="about.html" class="flex flex-col items-center text-gray-400 text-[10px]">
    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
      <path d="M11 9h2v8h-2zm0-4h2v2h-2zm1-5c-6.08 0-11 4.92-11 11s4.92 11 11 11 11-4.92 11-11-4.92-11-11-11z"/>
    </svg>
    <span>About</span>
  </a>

  <!-- Profile -->
  <a href="profil.html" class="flex flex-col items-center text-gray-400 text-[10px]">
    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
      <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
    </svg>
    <span>Profile</span>
  </a>

</div>

<script>
function logout(){
window.location.href="../index.html";
}
</script>

</body>
</html>
