<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Pesanan - NOVEXA</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-300 flex justify-center items-center min-h-screen">

  <div class="w-[375px] min-h-screen relative overflow-hidden text-white shadow-2xl">
    
    <div class="absolute inset-0">
      <img src="../img/background.gif" class="w-full h-full object-cover" alt="Background">
    </div>
    <div class="absolute inset-0 bg-black/60"></div>

    <div class="relative z-10">
      <header class="p-6 flex items-center gap-4">
        <a href="produk.html" class="bg-white/20 p-2 rounded-full backdrop-blur-md transition active:scale-90">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
          </svg>
        </a>
        <h2 class="text-xl font-bold">Riwayat Pesanan</h2>
      </header>

      <main class="px-6 space-y-4" id="orderList">
        </main>

      <div id="emptyMsg" class="hidden text-center mt-20 px-10">
        <div class="bg-white/10 backdrop-blur-md p-8 rounded-3xl border border-white/10">
          <p class="text-gray-400 text-sm">Belum ada pesanan aktif.</p>
          <a href="produk.html" class="inline-block mt-4 text-blue-400 font-bold text-sm underline">Belanja Sekarang</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const orderList = document.getElementById('orderList');
    const emptyMsg = document.getElementById('emptyMsg');

    // Fungsi untuk memuat dan menampilkan pesanan
    function loadOrders() {
      // Ambil data terbaru dari localStorage
      const orders = JSON.parse(localStorage.getItem('myOrders')) || [];
      
      // Bersihkan list sebelum diisi ulang
      orderList.innerHTML = '';

      if (orders.length === 0) {
        emptyMsg.classList.remove('hidden');
      } else {
        emptyMsg.classList.add('hidden');
        
        // Tampilkan pesanan (urutan terbaru di atas)
        orders.slice().reverse().forEach((order, index) => {
          // Kita butuh index asli (sebelum di-reverse) untuk menghapus
          const originalIndex = orders.length - 1 - index;
          
          const card = document.createElement('div');
          card.className = "bg-white/10 backdrop-blur-md p-4 rounded-2xl border border-white/10 flex justify-between items-center shadow-lg animate-fade-in";
          card.innerHTML = `
            <div class="flex-1">
              <h3 class="font-bold text-blue-300 text-sm">${order.produk}</h3>
              <p class="text-sm text-white">${order.nama || 'N/A'}</p>
              <p class="text-[10px] text-gray-400 italic">${order.tanggal}</p>
              <div class="mt-2">
                <span class="bg-yellow-500/20 text-yellow-400 text-[9px] font-bold px-2 py-0.5 rounded-full border border-yellow-500/30">
                  ${order.status}
                </span>
              </div>
              <p class="text-blue-300 font-bold text-sm mt-1">Jumlah: ${order.jumlah} | Total: ${order.totalHarga}</p>
            </div>
            
            <button onclick="deleteOrder(${originalIndex})" class="p-2 bg-red-500/20 hover:bg-red-500/40 text-red-400 rounded-xl transition active:scale-90 border border-red-500/30">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
              </svg>
            </button>
          `;

          orderList.appendChild(card);
        });
      }
    }

    // Fungsi untuk menghapus pesanan berdasarkan index
    function deleteOrder(index) {
      if (confirm("Apakah Anda yakin ingin membatalkan pesanan ini?")) {
        let orders = JSON.parse(localStorage.getItem('myOrders')) || [];
        
        // Hapus 1 data pada index terpilih
        orders.splice(index, 1);
        
        // Simpan kembali ke localStorage
        localStorage.setItem('myOrders', JSON.stringify(orders));
        
        // Muat ulang tampilan
        loadOrders();
      }
    }

    // Jalankan fungsi saat halaman dibuka
    loadOrders();
  </script>

  <style>
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
  </style>

</body>
</html>
